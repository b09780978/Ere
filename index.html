<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ere Lite IDE v4.0</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <style>
        :root { --bg: #272822; --nav: #191919; --sidebar: #21221d; --border: #3e3d32; --text: #f8f8f2; --accent: #a6e22e; --blue: #66d9ef; --pink: #f92672; --gray: #75715e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 核心修正：強制 Body 100% 不溢出 */
        html, body { height: 100%; height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); }
        body { font-family: 'Consolas', monospace; color: var(--text); display: flex; flex-direction: column; }
        
        /* 固定頂部 */
        .header-group { flex-shrink: 0; background: var(--nav); z-index: 1000; border-bottom: 1px solid #000; }
        .navbar { height: 45px; display: flex; align-items: center; padding: 0 10px; }
        .nav-title { font-weight: bold; color: var(--accent); font-size: 14px; margin-right: 10px; cursor: pointer; }
        .nav-btns { display: flex; gap: 4px; margin-left: auto; }
        .btn { background: #333; color: #ccc; border: 1px solid #555; padding: 5px 8px; cursor: pointer; font-size: 11px; border-radius: 4px; }
        
        .mobile-tools { display: flex; background: #333; padding: 6px; gap: 6px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
        .tool-btn { background: #444; color: #eee; border: 1px solid #666; padding: 8px 12px; border-radius: 4px; font-size: 14px; flex-shrink: 0; min-width: 38px; }

        /* 編輯器：獨立捲動，不影響外部佈局 */
        .editor-container { flex: 1; position: relative; overflow: hidden; background: var(--bg); border-bottom: 2px solid #000; }
        .CodeMirror { position: absolute; top: 0; left: 0; right: 0; bottom: 0; height: 100% !important; font-size: 16px; }

        /* 輸出區：獨立高度，防止撐開 body */
        .output-area { flex-shrink: 0; background: #000; display: flex; flex-direction: column; height: 35vh; max-height: 300px; }
        .output-tabs { display: flex; background: #1a1a1a; border-top: 1px solid var(--border); }
        .tab-btn { padding: 10px 15px; font-size: 11px; color: var(--gray); cursor: pointer; border-right: 1px solid var(--border); }
        .tab-btn.active { background: #000; color: var(--accent); font-weight: bold; }
        
        .log-panel { flex: 1; padding: 12px; overflow-y: auto; font-size: 13px; color: #eee; display: none; -webkit-overflow-scrolling: touch; }
        .log-panel.active { display: block; }
        #console-output { white-space: pre-wrap; word-break: break-all; margin: 0; padding-bottom: 20px; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -240px; width: 220px; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); transition: 0.3s; z-index: 2000; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar-header { padding: 15px; background: #1a1a1a; font-size: 12px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .add-file-btn { cursor: pointer; font-size: 20px; color: var(--blue); }
        .file-item { padding: 14px 15px; border-bottom: 1px solid #2d2e27; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
    </style>
</head>
<body>

<input type="file" id="file-input" style="display:none" onchange="handleFileOpen(event)">

<div class="header-group">
    <nav class="navbar">
        <div class="nav-title" onclick="toggleSidebar()">☰ MENU</div>
        <div id="tab-indicator" style="font-size: 11px; color: var(--gray);">main.py</div>
        <div class="nav-btns">
            <button class="btn" onclick="document.getElementById('file-input').click()" style="color:var(--blue)">Open</button>
            <button class="btn" onclick="saveFile()" style="color:var(--blue)">Save</button>
            <button class="btn" onclick="clearLogs()" style="color:var(--pink)">Clear</button>
            <button class="btn" onclick="runScript()" style="color:var(--accent); font-weight:bold;">Run</button>
        </div>
    </nav>
    <div class="mobile-tools">
        <button class="tool-btn" onclick="triggerHint()" style="color:var(--blue); font-weight:bold;">Hint</button>
        <button class="tool-btn" onclick="editor.undo()">Undo</button>
        <button class="tool-btn" onclick="insertText('\t')">Tab</button>
        <button class="tool-btn" onclick="insertQuote('(')">(</button>
        <button class="tool-btn" onclick="insertQuote(')')">)</button>
        <button class="tool-btn" onclick="insertQuote('[')">[</button>
        <button class="tool-btn" onclick="insertQuote('\"')">"</button>
        <button class="tool-btn" onclick="insertText(':')">:</button>
        <button class="tool-btn" style="color:var(--pink); margin-left: auto;" onclick="clearCode()">Clear Code</button>
    </div>
</div>

<div class="editor-container">
    <textarea id="code-editor"></textarea>
</div>

<div class="output-area">
    <div class="output-tabs">
        <div class="tab-btn active" onclick="switchTab('console')">CONSOLE</div>
        <div class="tab-btn" onclick="switchTab('system')">SYSTEM</div>
        <div class="tab-btn" onclick="showWiki()" style="color:var(--accent)">WIKI</div>
    </div>
    <div id="console-panel" class="log-panel active"><pre id="console-output"></pre></div>
    <div id="system-panel" class="log-panel"><div id="system-log"></div></div>
</div>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header">FILES <span class="add-file-btn" onclick="addFile()">+</span></div>
    <div id="file-list" style="flex:1; overflow-y:auto;"></div>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>

<script>
    let pyodide = null;
    let py_std_libs = null;
    let savedFiles = JSON.parse(localStorage.getItem('ere_saved')) || { 'main.py': '' };
    let activeFile = localStorage.getItem('ere_active') || 'main.py';

    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        mode: "python", theme: "monokai", lineNumbers: true, indentUnit: 4, matchBrackets: true,
        inputStyle: "contenteditable", viewportMargin: 20
    });

    // --- 快捷鍵 (S, O, Z, Enter) ---
    window.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
        if (e.ctrlKey && e.key === 'o') { e.preventDefault(); document.getElementById('file-input').click(); }
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runScript(); }
    });

    function handleFileOpen(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            savedFiles[file.name] = e.target.result;
            switchFile(file.name);
            logToSystem(`Imported: ${file.name}`, 'var(--blue)');
        };
        reader.readAsText(file);
    }

    function addFile() {
        let n = prompt("Filename:");
        if (n) { if (!n.includes('.')) n += '.py'; savedFiles[n] = ""; switchFile(n); }
    }

    function switchFile(n) {
        savedFiles[activeFile] = editor.getValue();
        activeFile = n;
        localStorage.setItem('ere_active', n);
        editor.setValue(savedFiles[n] || "");
        document.getElementById('tab-indicator').innerText = n;
        renderSidebar();
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
    }

    function saveFile() {
        savedFiles[activeFile] = editor.getValue();
        localStorage.setItem('ere_saved', JSON.stringify(savedFiles));
        logToSystem(`Saved: ${activeFile}`, 'var(--accent)');
        renderSidebar();
    }

    async function runScript() {
        switchTab('console');
        const out = document.getElementById('console-output');
        out.innerText = "Executing...\n";
        if (!pyodide) { 
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip");
            let py_lib_set_obj = await pyodide.runPythonAsync('import sys\nset(sys.stdlib_module_names)'); 
            py_std_libs = py_lib_set_obj.toJs({create_proxies : false});
        }
        try {
            const code = editor.getValue();
            const re = /^(?:import|from)\s+([a-zA-Z0-9_]+)/gm;
            const pkgs = [...new Set([...code.matchAll(re)].map(m => m[1]))].filter(p => !py_std_libs.has(p));
            if (pkgs.length > 0) {
                logToSystem(`Import: ${pkgs.join(', ')}`);
                for (let p of pkgs) { try { await pyodide.loadPackage(p); } catch { await pyodide.pyimport("micropip").install(p); } }
            }
            out.innerText = "";
            pyodide.setStdout({ batched: (s) => { 
                out.innerText += s + "\n"; 
                document.getElementById('console-panel').scrollTop = out.scrollHeight; 
            }});
            await pyodide.runPythonAsync(code);
            logToSystem("Done.", 'var(--accent)');
        } catch (err) { logToSystem(err.message, 'var(--pink)'); }
    }

    function logToSystem(msg, color = 'var(--gray)') {
        const log = document.getElementById('system-log');
        const div = document.createElement('div');
        div.style.color = color; div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.appendChild(div); document.getElementById('system-panel').scrollTop = log.scrollHeight;
    }

    function renderSidebar() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        Object.keys(savedFiles).forEach(name => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.style.color = name === activeFile ? 'var(--blue)' : '#ccc';
            div.innerHTML = `<span>${name}</span><span style="color:var(--pink)" onclick="deleteFile('${name}', event)">✖</span>`;
            div.onclick = () => switchFile(name);
            list.appendChild(div);
        });
    }

    function deleteFile(n, e) {
        e.stopPropagation();
        if (Object.keys(savedFiles).length <= 1) return;
        if (confirm(`Delete ${n}?`)) { delete savedFiles[n]; if (activeFile === n) switchFile(Object.keys(savedFiles)[0]); else renderSidebar(); saveFile(); }
    }

    function switchTab(type) {
        document.querySelectorAll('.tab-btn, .log-panel').forEach(el => el.classList.remove('active'));
        if (type === 'console') { document.querySelectorAll('.tab-btn')[0].classList.add('active'); document.getElementById('console-panel').classList.add('active'); }
        else if (type === 'system') { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('system-panel').classList.add('active'); }
    }

    function showWiki() {
        switchTab('none'); // 先關掉其他
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
        document.getElementById('system-panel').classList.add('active');
        document.getElementById('system-log').innerHTML = `<div style="color:var(--accent); font-weight:bold;">📚 Wiki v4.0</div>- Ctrl+Enter: Run<br>- Ctrl+S: Save<br>- Ctrl+O: Import File<br>- Ctrl+Z: Undo<br>- Auto-Import detection enabled.`;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function clearCode() { if(confirm("Clear?")) editor.setValue(""); }
    function clearLogs() { document.getElementById('console-output').innerText = ""; document.getElementById('system-log').innerHTML = ""; }
    function insertText(t) { editor.replaceRange(t, editor.getCursor()); editor.focus(); }
    function insertQuote(q) { 
        const s = editor.getSelection(); const pairs = {'(':')', '[':']', '\"':'\"', '\'':'\''};
        if (pairs[q]) { editor.replaceSelection(q + s + pairs[q]); let pos = editor.getCursor(); pos.ch -= 1; editor.setCursor(pos); }
        else insertText(q); editor.focus(); 
    }
    function triggerHint() { editor.showHint({ completeSingle: false }); }

    renderSidebar();
    editor.setValue(savedFiles[activeFile] || "");
</script>
</body>
</html>
