<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublime Pyodide IDE</title>
    <!-- CodeMirror 核心 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <!-- Sublime 主題 (Monokai) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <!-- Pyodide 加載器 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #272822; color: #f8f8f2; display: flex; flex-direction: column; height: 100vh; font-family: 'Consolas', monospace; }
        
        /* 頂部工具列 */
        #toolbar { background-color: #1e1e1e; padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #75715e; }
        #status { color: #e6db74; font-size: 14px; }
        button { background-color: #75715e; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        button:hover { background-color: #a6e22e; }
        button:disabled { background-color: #49483e; cursor: not-allowed; }

        /* 編輯器與輸出區塊 */
        #container { display: flex; flex-direction: column; flex-grow: 1; }
        .CodeMirror { height: 60vh; font-size: 16px; }
        #output { height: 35vh; background-color: #1e1e1e; color: #a6e22e; padding: 10px; overflow-y: auto; border-top: 2px solid #75715e; font-family: 'Consolas', monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="toolbar">
    <span id="status">正在載入 Pyodide...</span>
    <button id="runBtn" disabled>▶ Run (Ctrl+Enter)</button>
</div>

<div id="container">
    <textarea id="code"># 在此輸入 Python 代碼
import sys
print("Hello, Pyodide!")
print(f"Python version: {sys.version}")

for i in range(3):
    print(f"Loop: {i}")
</textarea>
    <div id="output"></div>
</div>
