<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ere Lite IDE - Auto-Dep v2.0</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <style>
        :root { --bg: #272822; --nav: #191919; --sidebar: #21221d; --border: #3e3d32; --text: #f8f8f2; --accent: #a6e22e; --blue: #66d9ef; --pink: #f92672; --gray: #75715e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Consolas', monospace; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
        
        /* Navbar */
        .navbar { background: var(--nav); height: 45px; display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #000; flex-shrink: 0; z-index: 100; }
        .nav-title { font-weight: bold; color: var(--accent); font-size: 14px; margin-right: 10px; cursor: pointer; }
        .nav-btns { display: flex; gap: 5px; margin-left: auto; }
        .btn { background: #333; color: #ccc; border: 1px solid #555; padding: 6px 10px; cursor: pointer; font-size: 12px; border-radius: 4px; }
        
        /* Mobile Tool Bar */
        .mobile-tools { display: flex; background: #333; padding: 6px; gap: 6px; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .mobile-tools::-webkit-scrollbar { display: none; }
        .tool-btn { background: #444; color: #eee; border: 1px solid #666; padding: 6px 14px; border-radius: 4px; font-size: 14px; flex-shrink: 0; min-width: 48px; text-align: center; }

        /* Layout */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .upper-layout { flex: 1; display: flex; overflow: hidden; position: relative; }
        .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; z-index: 1000; }
        
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -220px; height: 100%; }
            .sidebar.open { left: 0; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        }

        .file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 14px 15px; font-size: 14px; cursor: pointer; display: flex; align-items: center; color: #cfcfc2; border-bottom: 1px solid #2d2e27; }
        .file-item.active { background: #3e3d32; color: var(--blue); }
        .dirty-dot { color: #fff; margin-left: 5px; font-weight: bold; display: none; }
        .file-item.is-dirty .dirty-dot { display: inline; }

        .editor-section { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; }
        .CodeMirror { height: 100% !important; font-size: 16px; line-height: 1.5; }

        /* Hint UI */
        .CodeMirror-hints { z-index: 9999 !important; background: #2d2d2d !important; border: 1px solid #555 !important; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .CodeMirror-hint { padding: 12px 18px !important; color: #ddd !important; font-size: 15px; border-bottom: 1px solid #3d3d3d; }
        .CodeMirror-hint-active { background: var(--blue) !important; color: #000 !important; }

        /* Console */
        #console-panel { height: 160px; background: #121212; border-top: 2px solid #000; padding: 12px; overflow-y: auto; font-size: 13px; color: #eee; flex-shrink: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-title" onclick="toggleSidebar()">☰ ERE LITE</div>
    <div id="tab-indicator" style="font-size: 11px; color: var(--gray); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; max-width: 100px;">main.py</div>
    <div class="nav-btns">
        <button class="btn" onclick="saveFile()" style="color:var(--blue)">Save</button>
        <button class="btn" onclick="runScript()" style="color:var(--accent); font-weight:bold;">Run</button>
    </div>
</nav>

<div class="mobile-tools">
    <button class="tool-btn" style="color:var(--blue); font-weight:bold;" onclick="triggerHint()">Hint</button>
    <button class="tool-btn" onclick="editor.undo()">Undo</button>
    <button class="tool-btn" onclick="insertText('\t')">Tab</button>
    <button class="tool-btn" onclick="insertQuote('\"')">"</button>
    <button class="tool-btn" onclick="insertQuote('\'')">'</button>
    <button class="tool-btn" onclick="insertText(':')">:</button>
    <button class="tool-btn" onclick="insertText('(')">(</button>
    <button class="tool-btn" onclick="insertText(')')">)</button>
    <button class="tool-btn" onclick="triggerImport()">Import</button>
    <button class="tool-btn" onclick="exportFile()">Export</button>
</div>

<input type="file" id="file-input" style="display: none;" onchange="handleFileImport(event)">

<div class="main-container">
    <div class="upper-layout">
        <div id="sidebar" class="sidebar">
            <div style="padding:15px; background:#1a1a1a; font-size:12px; color:var(--accent); display:flex; justify-content:space-between; align-items:center;">
                FILES <span style="cursor:pointer; font-size:24px;" onclick="addFile()">+</span>
            </div>
            <div id="file-list" class="file-list"></div>
        </div>
        <div class="editor-section">
            <textarea id="code-editor"></textarea>
        </div>
    </div>
    <div id="console-panel"><div id="console-output" style="white-space: pre-wrap;"></div></div>
</div>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/anyword-hint.min.js"></script>

<script>
    let pyodide = null;
    let savedFiles = JSON.parse(localStorage.getItem('ere_saved')) || { 'main.py': '' };
    let currentSession = JSON.parse(localStorage.getItem('ere_session')) || { ...savedFiles };
    let dirtyFiles = new Set();
    let activeFile = localStorage.getItem('ere_active') || 'main.py';

    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        mode: "python", theme: "monokai", lineNumbers: true, indentUnit: 4, matchBrackets: true,
        inputStyle: "contenteditable",
        extraKeys: { "Ctrl-Space": "autocomplete" }
    });

    // 手機端自動補全監聽
    editor.on("keyup", function (cm, event) {
        const excludedKeys = [13, 27, 37, 38, 39, 40, 9, 16, 17, 18];
        if (excludedKeys.includes(event.keyCode)) return;
        const cur = cm.getCursor();
        const token = cm.getTokenAt(cur);
        if (token.string.match(/[a-zA-Z_\.]/)) {
            setTimeout(() => { if (!cm.state.completionActive) triggerHint(); }, 150);
        }
    });

    function triggerHint() { editor.focus(); editor.showHint({ completeSingle: false, container: document.body }); }
    function insertText(text) { editor.replaceRange(text, editor.getCursor()); editor.focus(); }
    function insertQuote(q) {
        const sel = editor.getSelection();
        if (sel.length > 0) editor.replaceSelection(q + sel + q);
        else editor.replaceRange(q, editor.getCursor());
        editor.focus();
    }

    // 檔案狀態管理
    Object.keys(currentSession).forEach(f => { if (currentSession[f] !== savedFiles[f]) dirtyFiles.add(f); });
    editor.on("change", () => {
        const val = editor.getValue();
        currentSession[activeFile] = val;
        localStorage.setItem('ere_session', JSON.stringify(currentSession));
        if (val !== savedFiles[activeFile]) {
            if (!dirtyFiles.has(activeFile)) { dirtyFiles.add(activeFile); renderSidebar(); }
        } else {
            if (dirtyFiles.has(activeFile)) { dirtyFiles.delete(activeFile); renderSidebar(); }
        }
    });

    function renderSidebar() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        Object.keys(savedFiles).forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${name === activeFile ? 'active' : ''} ${dirtyFiles.has(name) ? 'is-dirty' : ''}`;
            div.innerHTML = `<span style="flex:1; overflow:hidden;">${name}</span><span class="dirty-dot">•</span>
                ${name !== 'main.py' ? `<span onclick="deleteFile(event, '${name}')" style="color:var(--pink); font-size:22px; margin-left:10px;">×</span>` : ''}`;
            div.onclick = () => { switchFile(name); if(window.innerWidth <= 768) toggleSidebar(); };
            list.appendChild(div);
        });
        document.getElementById('tab-indicator').textContent = activeFile + (dirtyFiles.has(activeFile) ? " •" : "");
    }

    function toggleSidebar() { 
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('open');
        document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
    }

    function switchFile(name) {
        activeFile = name;
        localStorage.setItem('ere_active', name);
        editor.setValue(currentSession[name] || "");
        editor.clearHistory();
        renderSidebar();
    }

    function addFile() {
        let name = prompt("Filename:");
        if (name) { if (!name.includes('.')) name += '.py'; savedFiles[name] = ""; currentSession[name] = ""; switchFile(name); }
    }

    function saveFile() {
        savedFiles[activeFile] = editor.getValue();
        dirtyFiles.delete(activeFile);
        localStorage.setItem('ere_saved', JSON.stringify(savedFiles));
        renderSidebar();
    }

    function triggerImport() { document.getElementById('file-input').click(); }
    function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            savedFiles[file.name] = e.target.result;
            currentSession[file.name] = e.target.result;
            localStorage.setItem('ere_saved', JSON.stringify(savedFiles));
            switchFile(file.name);
        };
        reader.readAsText(file);
    }

    function exportFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.getValue()]));
        a.download = activeFile; a.click();
    }

    // --- 重點：Run 邏輯整合自動依賴安裝 ---
    async function runScript() {
        const out = document.getElementById('console-output');
        const panel = document.getElementById('console-panel');
        out.innerHTML = `<div style="color:var(--gray)"># Initializing Runtime...</div>`;
        panel.scrollTop = 0;

        if (!pyodide) { 
            pyodide = await loadPyodide(); 
            await pyodide.loadPackage("micropip");
        }

        try {
            const code = savedFiles[activeFile];
            // 使用正則表達式偵測所有的 import 或 from ... import
            const re = /^(?:import|from)\s+([a-zA-Z0-9_]+)/gm;
            const matches = [...code.matchAll(re)];
            const packages = [...new Set(matches.map(m => m[1]))].filter(p => !['math', 'os', 'sys', 'json', 're', 'time'].includes(p));

            if (packages.length > 0) {
                out.innerHTML += `<div style="color:var(--blue)"># Checking dependencies: ${packages.join(', ')}...</div>`;
                for (let pkg of packages) {
                    try {
                        // 優先嘗試使用 pyodide 內建庫 (如 numpy, pandas)
                        await pyodide.loadPackage(pkg);
                    } catch (e) {
                        // 如果 loadPackage 失敗，嘗試使用 micropip (純 python 庫)
                        try {
                            const micropip = pyodide.pyimport("micropip");
                            await micropip.install(pkg);
                        } catch (e2) {
                            out.innerHTML += `<div style="color:var(--pink)">! Warning: Could not load ${pkg}</div>`;
                        }
                    }
                }
            }

            out.innerHTML = `<div style="color:var(--gray)"># Executing ${activeFile}...</div><br>`;
            pyodide.setStdout({ batched: (s) => { 
                out.appendChild(document.createTextNode(s + "\n")); 
                panel.scrollTop = panel.scrollHeight; 
            }});

            await pyodide.runPythonAsync(code);
            const d = document.createElement('div'); d.style.color = 'var(--gray)'; d.style.marginTop = "10px"; d.innerText = "# [Process Completed]"; out.appendChild(d);
        } catch (err) {
            const e = document.createElement('div'); e.style.color = 'var(--pink)'; e.style.marginTop = "10px"; e.innerText = err.message; out.appendChild(e);
        }
        panel.scrollTop = panel.scrollHeight;
    }

    window.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runScript(); }
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
        if (e.ctrlKey && e.key === 'o') { e.preventDefault(); triggerImport(); }
        if (e.ctrlKey && e.key === 'e') { e.preventDefault(); exportFile(); }
    });

    renderSidebar();
    editor.setValue(currentSession[activeFile] || "");
</script>
</body>
</html>
